<div class="d-flex justify-content-between">
  <label
    id="select_{{id}}"
    [class.required]="required()"
    >
    <ng-content></ng-content>
  </label>
  <div>
    <ng-content select="[rightAligned]"></ng-content>
  </div>
</div>

<div class="position-relative">
  <dialog #dropup>
    <ng-template [ngTemplateOutlet]="dropContent"></ng-template>
  </dialog>
</div>

<div
  #dropGroup
  class="d-flex align-items-stretch"
  role="group"
  attr.aria-labelledby="select_{{id}}"
  >
  <button
    class="flex-1 br-start text-start"
    type="button"
    [class.active]="model().length > 0"
    [class.invalid]="!ngControl.control?.invalid"
    (click)="onClickGroup()"
    (blur)="onTouched()"
    >
    {{activeItemValues()}}
  </button>
  <button
    class="d-flex br-end d-flex align-items-center justify-content-center"
    [class.invalid]="!ngControl.control?.invalid"
    [disabled]="isDisabled()"
    (click)="onClickGroup()"
    (blur)="onTouched()"
    >
    <icon
      size="1rem"
      type="chevron"
      [fill]="[null, 'current']"
      fillRotate="90"
      [stroke]="['current']"
      [class.up]="dropup.open"
      [class.down]="dropdown.open"
    ></icon>
  </button>
</div>

<dialog #dropdown>
  <ng-template [ngTemplateOutlet]="dropContent"></ng-template>
</dialog>

<ng-template #dropContent>
  <div class="card">
    <div class="card-body">
      <div class="d-flex gap-2 align-items-stretch">
        <input
          [ngModel]="searchTerm()"
          (ngModelChange)="onSearchChange($event)"
          class="flex-1 br-start br-end"
          />
        @if (isMultiple()) {
          <button
            type="button"
            class="br-start br-end"
            (click)="onClickSelectAll()"
            >
            {{isSelectedAll() ? 'Deselect' : 'Select'}} All
          </button>
        }
      </div>
    </div>
    <div class="d-flex flex-column">
      @for (item of filteredItems(); track item) {
        <button
          class="d-flex flex-1 align-items-center text-start gap-2"
          [disabled]="isDisabled()"
          [class.active]="model().includes(item.key)"
          (click)="onClick(item)"
          >
          <div
            class="cc-button {{isMultiple() ? 'br-20' : 'br-50'}}"
            [class.active]="model().includes(item.key)"
            [class.disabled]="isDisabled()"
            [class.invalid]="ngControl.control?.invalid"
            >
            @if (model().includes(item.key)) {
              <icon
                size="1rem"
                [type]="isMultiple() ? 'check' : 'dot'"
                [fill]="[null, 'current']"
                fillRotate="90"
              ></icon>
            }
          </div>
          {{item.value}}
        </button>
      }
    </div>
  </div>
</ng-template>
