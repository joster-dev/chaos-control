<label
  [for]="id"
  [class.required]="required()"
>
  <ng-content></ng-content>
</label>

<input
  [ngModel]="model()"
  (ngModelChange)="onModelChange($event)"
  type="datetime-local"
  size="18"
  [class.active]="model() !== null"
  [class.br-start]="borderRadiusLeft()"
  [class.br-end]="borderRadiusRight()"
  [class.invalid]="ngControl.control?.invalid"
  [disabled]="isDisabled()"
  [id]="id"
  (blur)="onTouched()"
/>
