<label
  [for]="id"
  [class.required]="required"
  >
  <ng-content></ng-content>
</label>

<div class="d-flex">
  @if (!_isGrow) {
    <input
      type="text"
      [(ngModel)]="model"
      [class.br-end]="borderRadiusRight"
      [class.br-start]="borderRadiusLeft"
      class="flex-1"
      [minlength]="_minLength"
      [maxlength]="_maxLength"
      [class.active]="_model !== null"
      [class.invalid]="ngControl.control?.invalid"
      [disabled]="isDisabled"
      [id]="id"
      [spellcheck]="isSpellCheck"
      [placeholder]="placeholder"
      (blur)="onTouched(); onBlur.emit($event)"
      (focus)="onFocus.emit($event)"
      />
  }
  @if (_isGrow) {
    <textarea
      #textarea
      [(ngModel)]="model"
      [class.br-end]="borderRadiusRight"
      [class.br-start]="borderRadiusLeft"
      class="flex-1"
      [rows]="rows"
      [minlength]="_minLength"
      [maxlength]="_maxLength"
      [class.active]="_model !== null"
      [class.invalid]="ngControl.control?.invalid"
      [disabled]="isDisabled"
      [id]="id"
      [spellcheck]="isSpellCheck"
      [placeholder]="placeholder"
      (blur)="onTouched(); onBlur.emit($event)"
      (focus)="onFocus.emit($event)"
    ></textarea>
  }
</div>

@if (_isGrow) {
  <div
    class="d-flex"
    >
    <textarea
      #textareaHidden
      [ngModel]="model"
      class="hidden flex-1"
      [rows]="rows"
    ></textarea>
  </div>
}
