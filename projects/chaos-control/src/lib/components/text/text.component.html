<label
  [for]="id"
  [class.required]="required()"
  >
  <ng-content></ng-content>
</label>

<div class="d-flex">
  @if (!isGrow()) {
    <input
      type="text"
      [ngModel]="model()"
      (ngModelChange)="onModelChange($event)"
      [class.br-end]="borderRadiusRight()"
      [class.br-start]="borderRadiusLeft()"
      class="flex-1"
      [minlength]="minLength()"
      [maxlength]="maxLength()"
      [class.active]="model() !== null"
      [class.invalid]="ngControl.control?.invalid"
      [disabled]="isDisabled()"
      [id]="id"
      [spellcheck]="isSpellCheck()"
      [placeholder]="placeholder()"
      (blur)="onTouched(); onBlur.emit($event)"
      (focus)="onFocus.emit($event)"
      />
  }
  @if (isGrow()) {
    <textarea
      #textarea
      [ngModel]="model()"
      (ngModelChange)="onModelChange($event)"
      [class.br-end]="borderRadiusRight()"
      [class.br-start]="borderRadiusLeft()"
      class="flex-1"
      [rows]="rows()"
      [minlength]="minLength()"
      [maxlength]="maxLength()"
      [class.active]="model() !== null"
      [class.invalid]="ngControl.control?.invalid"
      [disabled]="isDisabled()"
      [id]="id"
      [spellcheck]="isSpellCheck()"
      [placeholder]="placeholder()"
      (blur)="onTouched(); onBlur.emit($event)"
      (focus)="onFocus.emit($event)"
    ></textarea>
  }
</div>

@if (isGrow()) {
  <div
    class="d-flex"
    >
    <textarea
      #textareaHidden
      [ngModel]="model()"
      class="hidden flex-1"
      [rows]="rows()"
    ></textarea>
  </div>
}
